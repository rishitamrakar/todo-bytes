<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>todo-bytes</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>todo-bytes</h1>
      </div>
      <nav class="lists" id="lists"></nav>
      <button class="btn-secondary" id="new-list-btn">+ New list</button>
    </aside>

    <main class="main">
      <header class="main-header">
        <h2 id="list-title">Loading…</h2>
      </header>

      <nav class="views" id="views">
        <button class="view-tab" data-view="open">Open</button>
        <button class="view-tab" data-view="today">Today</button>
        <button class="view-tab" data-view="overdue">Overdue</button>
        <button class="view-tab" data-view="tomorrow">Tomorrow</button>
        <button class="view-tab" data-view="week">This week</button>
        <button class="view-tab" data-view="next-week">Next week</button>
        <button class="view-tab" data-view="no-due">No due</button>
        <button class="view-tab" data-view="done">Done (7d)</button>
        <button class="view-tab" data-view="all">All</button>
      </nav>

      <div class="main-body">
        <section class="tasks-pane">
          <div class="hint" id="reorder-hint">
            Drag rows to reorder priority. Top of list = highest priority.
          </div>

          <ul class="tasks" id="tasks"></ul>

          <form class="quick-add" id="quick-add" autocomplete="off">
            <span class="quick-add-icon">+</span>
            <input
              type="text"
              id="quick-add-input"
              placeholder="Type to add a task, then press Enter…"
              autocomplete="off"
            />
          </form>

          <div class="empty-state" id="empty-state" hidden>
            <p>Nothing here yet.</p>
          </div>
        </section>

        <aside class="side-pane">
          <div class="stats-card">
            <h3>Progress</h3>
            <div class="stats-numbers">
              <div><span class="stat-value" id="stat-open">—</span><span class="stat-label">Open</span></div>
              <div><span class="stat-value" id="stat-done">—</span><span class="stat-label">Done</span></div>
              <div><span class="stat-value" id="stat-pct">—</span><span class="stat-label">Complete</span></div>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" id="progress-fill"></div>
            </div>
          </div>

          <div class="side-placeholder">
            <p>More widgets coming soon — charts, tag breakdown, weekly trend.</p>
          </div>
        </aside>
      </div>
    </main>
  </div>

  <!-- Edit task modal (for editing existing tasks — add is inline now) -->
  <div class="modal" id="task-modal" hidden>
    <div class="modal-card">
      <h3 id="modal-title">Edit task</h3>
      <form id="task-form">
        <label>
          Name
          <input type="text" name="name" required autocomplete="off" />
        </label>
        <label>
          Due
          <input type="datetime-local" name="due" />
        </label>
        <label>
          Tags (comma-separated)
          <input type="text" name="tags" autocomplete="off" placeholder="work, blog" />
        </label>
        <label>
          Project
          <input type="text" name="project" autocomplete="off" />
        </label>
        <label>
          Status
          <select name="status">
            <option value="todo">To Do</option>
            <option value="in-progress">In Progress</option>
            <option value="done">Done</option>
            <option value="hold">Hold</option>
            <option value="cancelled">Cancelled</option>
          </select>
        </label>
        <div class="meta-info">
          <span class="meta-label">Created:</span>
          <span id="meta-created">—</span>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" id="modal-cancel">Cancel</button>
          <button type="submit" class="btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- New list modal -->
  <div class="modal" id="list-modal" hidden>
    <div class="modal-card">
      <h3>New list</h3>
      <form id="list-form">
        <label>
          List name
          <input type="text" name="name" required autocomplete="off" />
        </label>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" id="list-cancel">Cancel</button>
          <button type="submit" class="btn-primary">Create</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
