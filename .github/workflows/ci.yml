name: CI

# Runs the test suite on every push to main and every PR targeting main.
# Required status check on `main` (set in branch protection) so nothing
# merges with a red build.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Only Python versions we declare support for in pyproject.toml.
        python-version: ["3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with all extras
        # [dev] pulls fastapi/uvicorn/httpx/mcp for the API + MCP tests.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q --tb=short
